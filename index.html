<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zaproszenie</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="login-section">
        <h1>Wpisz swój kod dostępu:</h1>
        <input type="text" id="passcode" placeholder="Twój kod...">
        <button onclick="checkLogin()">Wejdź</button>
        <p id="error-msg" style="color: red; display: none;">Nieprawidłowy kod!</p>
    </div>

    <div id="invitation-section" style="display: none;">
        <h1 id="welcome-text">Cześć!</h1>
        <p>Mamy przyjemność zaprosić Cię na nasze wydarzenie!</p>

        <div id="photo-container">
            <img id="user-photo" src="" alt="Twoje zdjęcie" style="max-width: 300px; border-radius: 15px;">
        </div>

        <div id="map-section">
            <h3>Widzimy się tutaj:</h3>
            <iframe
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2324.7823!2d18.646!3d54.352!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zNTRCsDIxJzA3LjIiTiAxOMKwMzgnNDUuNiJF!5e0!3m2!1spl!2spl!4v123456789"
                width="100%" height="300" style="border:0;" allowfullscreen="" loading="lazy">
            </iframe>
            <button onclick="logout()"
                style="background: #c3cfe2; font-size: 12px; padding: 6px 10px; margin-top: 10px;">
                To nie Ty? Wyloguj
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
